name: Weekly Ops Dry Run

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 16 * * 1"

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: PYTHONPATH=src python -m unittest discover -s tests
      - run: PYTHONPATH=src python -m mandala_ops.cli audit data/sample_products.csv --out output/seo_audit.csv
      - run: PYTHONPATH=src python -m mandala_ops.cli content-plan --out output/content_plan.csv
